<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>body{margin:0;font-family:system-ui;background:#f0f6ff;display:flex;align-items:center;justify-content:center;min-height:100vh}.card{background:#fff;max-width:380px;width:92%;border-radius:20px;padding:28px 24px;box-shadow:0 12px 40px rgba(0,0,0,.08)} h1{font-size:18px;margin:0}.sub{color:#6b7280;font-size:14px;margin:4px 0 0}.desc{font-size:14px;color:#374151;margin:16px 0 22px;line-height:1.5}</style>
</head><body>
<div class="card">
  <div style="display:flex;gap:12px;align-items:center">
    <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="7" width="18" height="12" rx="2" fill="#FDE68A"/><rect x="3" y="7" width="18" height="4" rx="2" fill="#FBBF24"/><rect x="8" y="3" width="8" height="6" rx="1.5" fill="#5B21B6"/></svg>
    </div>
    <div><h1>Đăng nhập hệ thống</h1><div class="sub">Đặt phòng họp</div></div>
  </div>
  <p class="desc">Sử dụng tài khoản Google công ty để tiếp tục. Hệ thống sẽ tự động xác minh email của bạn.</p>

  <div id="g_id_onload"
       data-client_id="789669724069-ritgtpq1ce2343mi9fh9ki0efeqd84d8.apps.googleusercontent.com"
       data-callback="handleCredentialResponse"
       data-auto_select="true"
       data-locale="vi"></div>
  <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-text="signin_with" data-size="large" data-locale="vi"></div>

  <div style="display:flex;gap:8px;font-size:12.5px;color:#6b7280;margin-top:18px">
    <span>✓</span><span>Kết nối được mã hóa qua Google OAuth 2.0. Chúng tôi không lưu mật khẩu của bạn.</span>
  </div>
  <div style="display:flex;justify-content:space-between;margin-top:22px;padding-top:14px;border-top:1px solid #f1f5f9;font-size:12px;color:#9ca3af">
    <span>© 2025 Phòng Họp</span><span>Hỗ trợ · Chính sách</span>
  </div>
</div>
<script>
function handleCredentialResponse(r){
  // tự reload lại chính Apps Script kèm token
  const url = location.href.split('?')[0] + '?token=' + encodeURIComponent(r.credential);
  location.replace(url);
}
</script>
</body></html>
